name: Update booking page

on:
  schedule:
    - cron: '0 * * * *'   # every hour on the hour
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Generate booking page
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name  "dory-bot"
          git config user.email "dory.ellis@gmail.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
