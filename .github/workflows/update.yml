name: Update booking page

on:
  schedule:
    - cron: '0 * * * *'   # every hour on the hour
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate booking page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCAL_MCP_TOKEN: ${{ secrets.GCAL_MCP_TOKEN }}
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name  "dory-bot"
          git config user.email "dory.ellis@gmail.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
