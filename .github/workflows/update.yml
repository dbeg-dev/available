name: Update booking page

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Generate booking page
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          python generate.py 2>&1 | tee generate.log
          if grep -q "WARNING: zero busy" generate.log; then
            echo "❌ Zero busy blocks — aborting"
            exit 1
          fi

      - name: Verify output
        run: |
          python3 -c "
          import re, json
          with open('index.html') as f: html = f.read()
          m = re.search(r'const BUSY = (\[.*?\]);', html)
          if not m: raise SystemExit('BUSY not found')
          busy = json.loads(m.group(1))
          print(f'{len(busy)} busy blocks in index.html')
          if len(busy) == 0: raise SystemExit('Empty BUSY array')
          "

      - name: Commit & push if changed
        run: |
          git config user.name  "dory-bot"
          git config user.email "dory.ellis@gmail.com"
          git add index.html busy_data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto-refresh: $(date -u "+%Y-%m-%d %H:%M UTC")"
          git fetch origin main
          git rebase origin/main
          git push
