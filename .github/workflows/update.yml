name: Update booking page

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Generate booking page
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          python generate.py 2>&1 | tee generate.log
          # Fail if BUSY is still empty in the output
          if grep -q "WARNING: zero busy" generate.log; then
            echo "❌ Calendar fetch returned 0 busy blocks — aborting push"
            exit 1
          fi
          echo "✓ Busy block count: $(grep 'busy blocks,' generate.log | tail -1)"

      - name: Verify output
        run: |
          python3 -c "
          import re
          with open('index.html') as f: html = f.read()
          m = re.search(r'const BUSY = (\[.*?\]);', html)
          if not m: raise SystemExit('BUSY constant not found in index.html')
          import json
          busy = json.loads(m.group(1))
          print(f'index.html has {len(busy)} busy blocks')
          if len(busy) == 0: raise SystemExit('ERROR: index.html has empty BUSY array')
          "

      - name: Commit & push if changed
        run: |
          git config user.name  "dory-bot"
          git config user.email "dory.ellis@gmail.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
