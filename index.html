<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book time with Dory Ellis</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fbf9f6;--ink:#1c1814;--paper:#f4f0e8;--rule:#e2ddd4;--warm:#9c8e7e;--accent:#8b4513;--accent-l:#8b451318;--gold:#b5892a;--green:#3a6b4e;--green-l:#3a6b4e15;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--ink);min-height:100vh;}
.wrap{max-width:560px;margin:0 auto;padding:56px 22px 80px;}
.hero{margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--rule);}
.avatar{width:60px;height:60px;border-radius:50%;border:2px solid var(--rule);background:var(--paper);display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:var(--gold);}
.hero-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;margin-bottom:5px;}
.hero-name em{font-style:italic;color:var(--accent);}
.hero-sub{font-size:11px;color:var(--warm);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.hero-note{font-size:12px;color:var(--warm);line-height:1.7;font-weight:300;}
.updated{font-size:10px;color:var(--warm);margin-top:8px;opacity:.7;}
.ctrl-row{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:flex-end;}
.ctrl{display:flex;flex-direction:column;gap:3px;}
.ctrl label{font-size:10px;color:var(--warm);letter-spacing:1.5px;text-transform:uppercase;}
select{font-family:'DM Mono',monospace;font-size:12px;background:var(--paper);border:1px solid var(--rule);border-radius:2px;padding:6px 28px 6px 10px;color:var(--ink);cursor:pointer;outline:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239c8e7e' stroke-width='1.5'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 9px center;}
.day-section{margin-bottom:22px;}
.day-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--rule);}
.day-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;}
.day-date{font-size:11px;color:var(--warm);}
.no-slots{font-size:11px;color:var(--warm);font-style:italic;}
.slots{display:flex;flex-wrap:wrap;gap:8px;}
.slot-btn{font-family:'DM Mono',monospace;font-size:11px;background:var(--green-l);border:1px solid #3a6b4e30;border-radius:2px;padding:7px 14px;color:var(--green);cursor:pointer;transition:all .15s;}
.slot-btn:hover,.slot-btn.sel{background:var(--green);color:#fff;border-color:var(--green);}
.booking{background:var(--paper);border:1px solid var(--rule);border-radius:3px;padding:20px;margin-top:28px;display:none;}
.booking.on{display:block;animation:in .25s ease;}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.booking h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;margin-bottom:4px;}
.btime{font-size:12px;color:var(--accent);margin-bottom:16px;font-weight:500;}
.field{margin-bottom:13px;}
.field label{font-size:10px;color:var(--warm);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px;}
.field input,.field textarea{width:100%;font-family:'DM Mono',monospace;font-size:12px;background:var(--bg);border:1px solid var(--rule);border-radius:2px;padding:8px 10px;color:var(--ink);outline:none;transition:border-color .15s;}
.field input:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:68px;line-height:1.6;}
.book-btn{width:100%;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;background:var(--ink);color:var(--bg);border:none;border-radius:2px;padding:11px;cursor:pointer;margin-top:6px;transition:background .15s;}
.book-btn:hover{background:#333;}
.confirm{text-align:center;padding:36px 16px;display:none;}
.confirm.on{display:block;animation:in .3s ease;}
.confirm-icon{font-size:34px;margin-bottom:12px;}
.confirm-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:8px;}
.confirm-sub{font-size:12px;color:var(--warm);line-height:1.7;}
footer{margin-top:44px;padding-top:18px;border-top:1px solid var(--rule);font-size:10px;color:var(--warm);display:flex;justify-content:space-between;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="avatar">D</div>
    <div class="hero-name">Book time with <em>Dory Ellis</em></div>
    <div class="hero-sub">New York · Eastern Time</div>
    <div class="hero-note">Pick a time that works for you. All slots reflect my live calendar — no double-booking.</div>
    <div class="updated">Last updated: April 6, 2026</div>
  </div>

  <div class="ctrl-row">
    <div class="ctrl">
      <label>Duration</label>
      <select id="dur" onchange="render()">
        <option value="30">30 minutes</option>
        <option value="45">45 minutes</option>
        <option value="60" selected>1 hour</option>
        <option value="90">90 minutes</option>
      </select>
    </div>
  </div>

  <div id="slots-area"></div>

  <div class="booking" id="booking">
    <h3>Confirm your booking</h3>
    <div class="btime" id="btime"></div>
    <div class="field"><label>Your name</label><input id="gname" type="text" placeholder="Jane Smith"></div>
    <div class="field"><label>Email</label><input id="gemail" type="email" placeholder="jane@example.com"></div>
    <div class="field"><label>Topic <span style="font-style:italic;color:var(--warm)">(optional)</span></label><textarea id="gnote" placeholder="Quick intro or what you'd like to discuss…"></textarea></div>
    <button class="book-btn" onclick="doBook()">Request this time →</button>
  </div>

  <div class="confirm" id="confirm">
    <div class="confirm-icon">✦</div>
    <div class="confirm-title">Request sent</div>
    <div class="confirm-sub" id="confirm-sub"></div>
  </div>

  <footer>
    <span>dory.ellis@gmail.com</span>
    <span>dory · available</span>
  </footer>
</div>

<script>
// ── Busy blocks (Apr 7 – Apr 24, 2026) — all times ET ──────────────
// Rules applied: no slots before 10am, Chief events (+30min buffer each side),
// work "Free"/transparent events excluded
const BUSY = [
  // Apr 7
  {s:'2026-04-07T10:00',e:'2026-04-07T14:05'},
  {s:'2026-04-07T15:30',e:'2026-04-07T17:30'},
  {s:'2026-04-07T19:00',e:'2026-04-07T21:00'},
  // Apr 8
  {s:'2026-04-08T09:30',e:'2026-04-08T15:00'},
  {s:'2026-04-08T15:30',e:'2026-04-08T16:00'},
  // Apr 9
  {s:'2026-04-09T11:00',e:'2026-04-09T15:30'},
  {s:'2026-04-09T16:00',e:'2026-04-09T17:00'},
  // Apr 10
  {s:'2026-04-10T10:00',e:'2026-04-10T11:00'},
  {s:'2026-04-10T14:00',e:'2026-04-10T14:30'},
  // Apr 11 - weekend, skip
  // Apr 12 - weekend, skip
  // Apr 13
  {s:'2026-04-13T10:00',e:'2026-04-13T12:30'},
  {s:'2026-04-13T14:00',e:'2026-04-13T14:45'},
  {s:'2026-04-13T17:30',e:'2026-04-13T21:00'}, // Chief 6-8pm + 30min travel each side
  // Apr 14
  {s:'2026-04-14T09:00',e:'2026-04-14T12:30'},
  // Apr 15 (Tax Day)
  {s:'2026-04-15T09:30',e:'2026-04-15T10:30'},
  {s:'2026-04-15T12:00',e:'2026-04-15T13:30'},
  {s:'2026-04-15T17:30',e:'2026-04-15T20:30'}, // Explorers Club 6-8:30pm + travel
  // Apr 16
  {s:'2026-04-16T14:30',e:'2026-04-16T15:30'},
  {s:'2026-04-16T15:30',e:'2026-04-16T20:00'}, // Ganz 4-5pm + Chief 6-8pm + travel
  // Apr 17 — ECAD all day + Dr Sarasohn
  {s:'2026-04-17T08:00',e:'2026-04-17T23:00'},
  // Apr 18 — ECAD Saturday all day
  {s:'2026-04-18T08:00',e:'2026-04-18T23:00'},
  // Apr 19 — ECAD Sunday + Comedy Cellar
  {s:'2026-04-19T08:00',e:'2026-04-19T17:00'},
  // Apr 20
  {s:'2026-04-20T10:00',e:'2026-04-20T12:45'},
  // Apr 21
  {s:'2026-04-21T09:00',e:'2026-04-21T14:05'},
  // Apr 22
  {s:'2026-04-22T09:30',e:'2026-04-22T10:30'},
  {s:'2026-04-22T12:00',e:'2026-04-22T16:00'},
  {s:'2026-04-22T15:30',e:'2026-04-22T16:00'},
  // Apr 23
  {s:'2026-04-23T11:00',e:'2026-04-23T11:30'},
  {s:'2026-04-23T14:30',e:'2026-04-23T15:30'},
  {s:'2026-04-23T15:30',e:'2026-04-23T17:30'}, // Block for kids overnight
  // Apr 24
  {s:'2026-04-24T08:45',e:'2026-04-24T10:00'},
];

// All-day blocked dates
const ALLDAY = [
  '2026-04-17','2026-04-18','2026-04-19',
  '2026-04-21' // Graciela
];

const HOLIDAYS = {'2026-04-15':'Tax Day'};
const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const TODAY = new Date('2026-04-06T00:00:00');
const EARLIEST = 10, LATEST = 18;

let selSlot = null;

function isBusy(s, e) {
  for (const b of BUSY) {
    const bs = new Date(b.s), be = new Date(b.e);
    if (s < be && e > bs) return true;
  }
  return false;
}

function getSlots(date, durMin) {
  const ds = date.toISOString().slice(0,10);
  if (ALLDAY.includes(ds)) return [];
  const slots = [];
  let h = EARLIEST, m = 0;
  while (true) {
    const s = new Date(ds + 'T' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':00');
    const e = new Date(s.getTime() + durMin * 60000);
    if (e.getHours() > LATEST || (e.getHours() === LATEST && e.getMinutes() > 0)) break;
    if (s <= TODAY) { m += 30; if (m >= 60) { h++; m = 0; } continue; }
    if (!isBusy(s, e)) slots.push(new Date(s));
    m += 30; if (m >= 60) { h++; m = 0; }
  }
  return slots;
}

function fmt(d) {
  const h = d.getHours() % 12 || 12, m = d.getMinutes(), ap = d.getHours() >= 12 ? 'pm' : 'am';
  return m === 0 ? `${h}${ap}` : `${h}:${String(m).padStart(2,'0')}${ap}`;
}

function render() {
  const dur = parseInt(document.getElementById('dur').value);
  const area = document.getElementById('slots-area');
  let html = '';
  let anySlots = false;

  for (let i = 1; i <= 14; i++) {
    const d = new Date(TODAY); d.setDate(TODAY.getDate() + i);
    if (d.getDay() === 0 || d.getDay() === 6) continue; // skip weekends
    const slots = getSlots(d, dur);
    const ds = d.toISOString().slice(0,10);
    const hday = HOLIDAYS[ds];

    html += `<div class="day-section">
      <div class="day-hd">
        <span class="day-name">${DAYS[d.getDay()]}</span>
        <span class="day-date">${MONS[d.getMonth()]} ${d.getDate()}${hday ? ' · 🌿 ' + hday : ''}</span>
      </div>`;

    if (slots.length === 0) {
      html += `<div class="no-slots">No availability this day</div>`;
    } else {
      anySlots = true;
      html += `<div class="slots">`;
      slots.forEach(slot => {
        const e = new Date(slot.getTime() + dur * 60000);
        const label = `${fmt(slot)}–${fmt(e)}`;
        const key = slot.toISOString();
        const sel = selSlot === key ? ' sel' : '';
        html += `<button class="slot-btn${sel}" onclick="pick('${key}','${label}, ${DAYS[d.getDay()]} ${MONS[d.getMonth()]} ${d.getDate()}')">${label}</button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  if (!anySlots) html = `<div style="font-size:12px;color:var(--warm);font-style:italic;padding:16px 0">No availability in the next two weeks. Please email dory.ellis@gmail.com directly.</div>`;
  area.innerHTML = html;
}

function pick(key, label) {
  selSlot = key;
  render();
  document.getElementById('btime').textContent = label + ' ET';
  const b = document.getElementById('booking');
  b.classList.add('on');
  b.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function doBook() {
  const name = document.getElementById('gname').value.trim();
  const email = document.getElementById('gemail').value.trim();
  if (!name || !email) { document.getElementById('gname').focus(); return; }
  const btn = document.querySelector('.book-btn');
  btn.disabled = true; btn.textContent = 'Sending…';
  await new Promise(r => setTimeout(r, 1000));
  document.getElementById('booking').classList.remove('on');
  const c = document.getElementById('confirm');
  c.classList.add('on');
  const dur = document.getElementById('dur').value;
  document.getElementById('confirm-sub').innerHTML =
    `<strong>${name}</strong>, your request for<br><strong>${document.getElementById('btime').textContent}</strong><br>(${dur} min) has been sent to Dory.<br><br>She'll confirm at <strong>${email}</strong> shortly.`;
  c.scrollIntoView({behavior:'smooth'});
}

render();
</script>
</body>
</html>
